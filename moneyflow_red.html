<style>
  :root {
    --r1: #8B0000;
    --r2: #CC0000;
    --r3: #FF3333;
    --dark: #0d0205;
    --dark2: #130608;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: #fff;
    font-family: 'Raleway', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Grid texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(180,0,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(180,0,0,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* Ambient orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    pointer-events: none;
    z-index: 0;
  }
  .orb-1 {
    width: 450px; height: 450px;
    background: radial-gradient(circle, rgba(139,0,0,0.5), transparent);
    top: -120px; left: -120px;
    animation: o1 9s ease-in-out infinite;
  }
  .orb-2 {
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(180,0,0,0.4), transparent);
    bottom: -100px; right: -80px;
    animation: o2 11s ease-in-out infinite;
  }
  .orb-3 {
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(255,50,50,0.18), transparent);
    top: 45%; left: 55%;
    animation: o3 14s ease-in-out infinite;
  }
  @keyframes o1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(35px,45px); } }
  @keyframes o2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-28px,-38px); } }
  @keyframes o3 { 0%,100% { transform: translate(0,0); } 33% { transform: translate(18px,-18px); } 66% { transform: translate(-18px,12px); } }

  /* Floating particles */
  #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .particle {
    position: absolute; border-radius: 50%;
    background: rgba(220,50,50,0.55);
    animation: rise linear infinite;
  }
  @keyframes rise {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-100vh) translateX(var(--tx,20px)); opacity: 0; }
  }

  /* CARD */
  .card {
    position: relative;
    z-index: 2;
    width: min(420px, 92vw);
    background: rgba(140,0,0,0.07);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    border: 1px solid rgba(200,0,0,0.20);
    border-radius: 28px;
    padding: 44px 36px 40px;
    text-align: center;
    overflow: hidden;
    animation: cardIn 0.9s cubic-bezier(0.16,1,0.3,1) both;
    box-shadow:
      0 0 0 1px rgba(220,50,50,0.10),
      0 24px 64px rgba(0,0,0,0.65),
      0 0 100px rgba(160,0,0,0.12),
      inset 0 -1px 0 rgba(255,80,80,0.07);
  }
  /* Top shimmer */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 8%; right: 8%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,60,60,0.5), rgba(255,255,255,0.15), rgba(255,60,60,0.5), transparent);
  }
  /* Inner top glow */
  .card::after {
    content: '';
    position: absolute;
    top: -60px; left: 50%; transform: translateX(-50%);
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(180,0,0,0.13), transparent 70%);
    pointer-events: none;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(44px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* AVATAR */
  .avatar-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 26px;
    animation: popIn 0.8s 0.2s cubic-bezier(0.16,1,0.3,1) both, float 3.5s 1.2s ease-in-out infinite;
  }
  .avatar-wrap img {
    width: 120px; height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255,60,60,0.45);
    box-shadow:
      0 0 0 6px rgba(180,0,0,0.10),
      0 0 32px rgba(200,0,0,0.50),
      0 0 64px rgba(180,0,0,0.24);
    display: block;
  }
  .ring-1 {
    position: absolute; inset: -10px; border-radius: 50%;
    border: 1.5px solid transparent;
    border-top-color: rgba(255,50,50,0.85);
    border-right-color: rgba(255,50,50,0.28);
    animation: spin 3s linear infinite;
  }
  .ring-2 {
    position: absolute; inset: -17px; border-radius: 50%;
    border: 1px solid transparent;
    border-bottom-color: rgba(180,0,0,0.50);
    animation: spin 5s linear infinite reverse;
  }
  .dot {
    position: absolute; bottom: 6px; right: 6px;
    width: 14px; height: 14px;
    background: #FF2222; border-radius: 50%;
    border: 2px solid var(--dark);
    box-shadow: 0 0 8px #FF2222;
    animation: dotPulse 2s ease-in-out infinite;
  }
  @keyframes spin    { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes float   { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
  @keyframes popIn   { from { opacity:0; transform:scale(0.7); } to { opacity:1; transform:scale(1); } }
  @keyframes dotPulse { 0%,100% { box-shadow: 0 0 6px #FF2222; } 50% { box-shadow: 0 0 16px #FF2222, 0 0 26px rgba(220,0,0,0.5); } }

  /* BADGE */
  .badge {
    display: inline-block;
    background: linear-gradient(135deg, rgba(160,0,0,0.22), rgba(220,30,30,0.10));
    border: 1px solid rgba(255,60,60,0.42);
    color: #FF5555;
    font-family: 'Raleway', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: 3px; padding: 5px 14px;
    border-radius: 100px; text-transform: uppercase;
    margin-bottom: 10px;
    animation: fadeUp 0.6s 0.35s ease both;
    box-shadow: 0 0 16px rgba(220,0,0,0.18), inset 0 0 10px rgba(200,0,0,0.06);
  }

  /* NAME */
  .name {
    font-family: 'Cinzel', serif;
    font-size: 26px; font-weight: 700;
    letter-spacing: 1px; margin-bottom: 4px;
    background: linear-gradient(135deg, #fff 30%, rgba(255,80,80,0.95));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeUp 0.6s 0.4s ease both;
  }

  /* DIVIDER */
  .divider {
    width: 44px; height: 2px;
    background: linear-gradient(90deg, transparent, #FF3333, transparent);
    margin: 14px auto 18px; border-radius: 2px;
    animation: fadeUp 0.6s 0.5s ease both;
  }

  /* MESSAGE */
  .msg-box {
    background: rgba(140,0,0,0.10);
    border: 1px solid rgba(220,50,50,0.18);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 28px;
    animation: fadeUp 0.6s 0.6s ease both;
    position: relative; overflow: hidden;
  }
  .msg-box::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,60,60,0.38), transparent);
  }
  .msg-text {
    font-size: clamp(15px,4vw,17px);
    line-height: 1.85;
    color: rgba(255,255,255,0.88);
    font-weight: 500;
  }

  /* BUTTON */
  .btn {
    display: inline-flex;
    align-items: center; justify-content: center;
    gap: 12px; width: 100%;
    background: linear-gradient(135deg, #8B0000 0%, #CC0000 50%, #990000 100%);
    color: #fff;
    font-family: 'Raleway', sans-serif;
    font-size: 20px; font-weight: 800;
    padding: 20px 40px;
    border-radius: 16px;
    text-decoration: none; border: none; cursor: pointer;
    position: relative; overflow: hidden;
    animation: fadeUp 0.6s 0.7s ease both, btnGlow 2.5s 1.5s ease-in-out infinite;
    transition: transform 0.2s;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 30px rgba(180,0,0,0.42), 0 2px 10px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,80,80,0.18);
  }
  .btn::before {
    content: '';
    position: absolute;
    top: 0; left: -75%; width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
    transform: skewX(-20deg);
    animation: shine 3s 1.5s ease-in-out infinite;
  }
  .btn:hover { transform: translateY(-2px); }
  @keyframes shine  { 0%,100% { left:-75%; } 50% { left:125%; } }
  @keyframes btnGlow {
    0%,100% { box-shadow: 0 4px 24px rgba(180,0,0,0.42), 0 2px 10px rgba(0,0,0,0.4); }
    50%      { box-shadow: 0 4px 50px rgba(220,0,0,0.70), 0 0 80px rgba(200,0,0,0.28); }
  }

  .footer-note {
    margin-top: 18px;
    font-size: 11px; letter-spacing: 0.5px;
    color: rgba(255,255,255,0.18);
    animation: fadeUp 0.6s 0.8s ease both;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }
</style>
</head>
